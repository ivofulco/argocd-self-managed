apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ivofulco/argocd-self-managed
    targetRevision: HEAD
    path: istio
    directory:
      recurse: true    
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
